services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: repodoctor
      POSTGRES_USER: ${POSTGRES_USER:-repodoctor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repodoctor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://repodoctor:${POSTGRES_PASSWORD}@postgres:5432/repodoctor
      APP_REDIS_URL: redis://redis:6379/0
      APP_ENVIRONMENT: production
      APP_DEBUG: "false"
      APP_SECRET_KEY: ${APP_SECRET_KEY:?Set APP_SECRET_KEY}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:?Set APP_CORS_ORIGINS}
      APP_WORKERS: ${APP_WORKERS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
