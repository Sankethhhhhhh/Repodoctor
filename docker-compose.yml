services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: repodoctor
      POSTGRES_USER: repodoctor
      POSTGRES_PASSWORD: repodoctor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repodoctor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://repodoctor:repodoctor@postgres:5432/repodoctor
      APP_REDIS_URL: redis://redis:6379/0
      APP_ENVIRONMENT: development
      APP_DEBUG: "true"
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
